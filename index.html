<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub DB App</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-elevated: #21262d;
        --border: #30363d;
        --border-muted: #21262d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --text-subtle: #484f58;
        --accent: #58a6ff;
        --radius: 6px;
        --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      body {
        font-family: var(--font);
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 0;
      }
      button {
        font-family: inherit;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: inherit;
        line-height: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app">App loading...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
