<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub DB App</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: #0d1117;
        color: #e6edf3;
      }
      #app {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        padding: 0;
      }
      button {
        margin-top: 1rem;
        padding: 0.6rem 1.2rem;
        font-size: 1rem;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #2ea043;
      }
    </style>
  </head>
  <body>
    <div id="app">App loading...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
